name: Bug Report
description: Report a bug in Korum
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this — it helps make Korum better.

  - type: input
    id: version
    attributes:
      label: Korum version
      placeholder: "0.1.0-alpha"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: macOS version
      placeholder: "macOS 15.4 (Apple Silicon)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Open Korum
        2. Create a workspace
        3. Open terminal
        4. Observe issue
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs or attach screenshots if possible — this helps a lot.
